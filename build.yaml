# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#
---
include:

# Hillside 46
#   Comment out below if you do not have this board, to save build time
  - board: nice_nano//zmk
    shield: hillside46_left
  - board: nice_nano//zmk
    shield: hillside46_right

  # Reset Firmware
  #   Uncomment below lines to build reset firmware for nice_nano board.
  #   This can be used to reset the board to bootloader mode.
  #   See: https://zmk.dev/docs/firmware/bootloader-flash#reset-firmware
  - board: nice_nano//zmk
    shield: settings_reset

# Hillside 48
#   Comment out below if you do not have this board, to save build time
  # - board: nice_nano
  #   shield: hillside48_left
  # - board: nice_nano
  #   shield: hillside48_right

# Hillside 52
#   Comment out below if you do not have this board, to save build time
  # - board: nice_nano
  #   shield: hillside52_left
  # - board: nice_nano
  #   shield: hillside52_right
